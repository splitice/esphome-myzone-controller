# Example ESPHome configuration for the MyZone HVAC zone controller.
#
# Wire the RS-485 adapter's TX/RX pins to the GPIO pins below.
# The controller communicates at 230400 baud, 8 data bits, no parity, 1 stop bit.

esphome:
  name: myzone-controller
  friendly_name: MyZone Controller

esp32:
  board: esp32dev
  framework:
    type: arduino

# Pull in the external component from this repository.
external_components:
  - source:
      type: git
      url: https://github.com/splitice/esphome-myzone-controller
    components: [myzone_controller]

logger:

api:

ota:
  password: "changeme"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

uart:
  id: myzone_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 230400
  data_bits: 8
  parity: NONE
  stop_bits: 1

myzone_controller:
  id: myzone
  uart_id: myzone_uart
  zones:
    - name: "Zone 1"
    - name: "Zone 2"
    - name: "Zone 3"
    - name: "Zone 4"
    - name: "Zone 5"
