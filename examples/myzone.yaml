esphome:
  name: myzone-controller

external_components:
  - source: github://splitice/esphome-myzone-controller

logger:

uart:
  id: myzone_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 250000
  data_bits: 8
  parity: ODD
  stop_bits: 2

myzone:
  id: myzone_controller
  uart_id: myzone_uart
  # Optional active-low TX enable
  # rse_pin: GPIO4
  zone_1:
    name: "Zone 1"
  zone_2:
    name: "Zone 2"
  zone_3:
    name: "Zone 3"
  zone_4:
    name: "Zone 4"
  zone_5:
    name: "Zone 5"
  zone_6:
    name: "Zone 6"
